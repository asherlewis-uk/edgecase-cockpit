# electron-builder configuration for Edgecase Cockpit desktop builds.
#
# Phase 4 checklist before signed release:
#  - macOS: CSC_LINK + CSC_KEY_PASSWORD (Developer ID cert) and
#    APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD for notarization are set in .env.local
#
# Run: bun run native:desktop:build

appId: uk.asherlewis.edgecase.cockpit
productName: Edgecase Cockpit
copyright: Copyright © 2025 Asher Lewis

# electron/main.ts is compiled to electron/dist/main.js before packaging.
# See native:desktop:build script in package.json.
directories:
  buildResources: electron/resources
  output: electron/release

files:
  # Include the compiled Electron main/preload.
  - electron/dist/**/*
  # Include the Vite web build.
  - dist/client/**/*

mac:
  category: public.app-category.productivity
  # Signing enabled via CSC_LINK + CSC_KEY_PASSWORD env vars.
  # identity: null means unsigned (development only).
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: electron/resources/icon.icns

# DMG window layout (macOS).
dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
