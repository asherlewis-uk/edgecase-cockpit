# electron-builder configuration for Edgecase Cockpit desktop builds.
#
# Phase 4 checklist before signed release:
#  - macOS: set CSC_LINK + CSC_KEY_PASSWORD (Developer ID cert) and
#    APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD for notarization.
#  - Windows: set CSC_LINK + CSC_KEY_PASSWORD (EV or Standard cert).
#  - Linux: no signing required.
#
# Run: bun run native:desktop:build

appId: uk.asherlewis.edgecase.cockpit
productName: Edgecase Cockpit
copyright: Copyright © 2025 Asher Lewis

# electron/main.ts is compiled to electron/dist/main.js before packaging.
# See native:desktop:build script in package.json.
main: electron/dist/main.js

directories:
  buildResources: electron/resources
  output: electron/release

files:
  # Include the compiled Electron main/preload.
  - electron/dist/**/*
  # Include the Vite web build.
  - dist/client/**/*

mac:
  category: public.app-category.productivity
  # TODO Phase 4: configure identity for signing.
  # identity: null means unsigned (development only).
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: electron/resources/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/resources/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: electron/resources/icon.png
  category: Office

# DMG window layout (macOS).
dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
