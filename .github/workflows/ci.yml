name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Vite/Nitro
        run: bun run build

  web-e2e:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun run test:e2e:install

      - name: Run production-preview runtime audit
        run: bun run test:e2e:audit:preview

      - name: Upload web E2E artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: web-e2e-runtime-audit
          path: |
            test-results/runtime-audit/
            test-results/e2e-preview.json
            playwright-report/preview/
          if-no-files-found: warn

  package:
    needs: web-e2e
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            os: macos-latest
            artifact_name: macos-dmg
            artifact_path: electron/release/*.dmg
          - target: android
            os: ubuntu-latest
            artifact_name: android-apk
            artifact_path: android/app/build/outputs/apk/release/*.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native shell
        run: bun run native:build

      - name: Compile Electron main
        if: matrix.target == 'macos'
        run: bun run native:desktop:compile

      - name: Build macOS DMG
        if: matrix.target == 'macos'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac dmg --publish never

      - name: Verify macOS signature and notarization
        if: matrix.target == 'macos'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "No CSC_LINK secret; skipping signed-release verification."
            exit 0
          fi
          APP_ARM64="electron/release/mac-arm64/Edgecase Cockpit.app"
          APP_X64="electron/release/mac/Edgecase Cockpit.app"
          for APP in "$APP_ARM64" "$APP_X64"; do
            if [ -d "$APP" ]; then
              echo "==> Verifying $APP"
              codesign --verify --deep --strict --verbose=2 "$APP"
              spctl --assess --type execute --verbose "$APP" || true
              xcrun stapler validate "$APP" || true
            fi
          done
          DMG_ARM64="electron/release/Edgecase Cockpit-1.0.0-arm64.dmg"
          DMG_X64="electron/release/Edgecase Cockpit-1.0.0.dmg"
          for DMG in "$DMG_ARM64" "$DMG_X64"; do
            if [ -f "$DMG" ]; then
              echo "==> Validating staple for $DMG"
              xcrun stapler validate "$DMG" || true
            fi
          done

      - name: Sync Capacitor Android project
        if: matrix.target == 'android'
        run: npx cap sync android

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Make gradlew executable
        if: matrix.target == 'android'
        run: chmod +x ./android/gradlew

      - name: Build Android release APK
        if: matrix.target == 'android'
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: package
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Attach native artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v1-native-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          # Check if release already exists
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            # Release exists, upload artifacts with clobber
            echo "Release $RELEASE_TAG already exists, uploading artifacts..."
            gh release upload "$RELEASE_TAG" release-assets/*.dmg release-assets/*.apk --clobber
          else
            # Release does not exist, create it
            echo "Creating new release $RELEASE_TAG..."
            gh release create "$RELEASE_TAG" release-assets/*.dmg release-assets/*.apk \
              --target "$GITHUB_SHA" \
              --title "V1 Native Build ${{ github.run_number }}.${{ github.run_attempt }}" \
              --notes "Automated native build for $GITHUB_SHA." \
              --prerelease \
              --latest=false
          fi
