name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Vite/Nitro
        run: bun run build

  package:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            os: macos-latest
            artifact_name: macos-dmg
            artifact_path: electron/release/*.dmg
          - target: android
            os: ubuntu-latest
            artifact_name: android-apk
            artifact_path: android/app/build/outputs/apk/release/*.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native shell
        run: bun run native:build

      - name: Compile Electron main
        if: matrix.target == 'macos'
        run: bun run native:desktop:compile

      - name: Build macOS DMG
        if: matrix.target == 'macos'
        run: npx electron-builder --mac dmg --publish never

      - name: Sync Capacitor Android project
        if: matrix.target == 'android'
        run: npx cap sync android

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Make gradlew executable
        if: matrix.target == 'android'
        run: chmod +x ./android/gradlew

      - name: Build Android release APK
        if: matrix.target == 'android'
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: package
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Attach native artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v1-native-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          # Check if release already exists
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            # Release exists, upload artifacts with clobber
            echo "Release $RELEASE_TAG already exists, uploading artifacts..."
            gh release upload "$RELEASE_TAG" release-assets/*.dmg release-assets/*.apk --clobber
          else
            # Release does not exist, create it
            echo "Creating new release $RELEASE_TAG..."
            gh release create "$RELEASE_TAG" release-assets/*.dmg release-assets/*.apk \
              --target "$GITHUB_SHA" \
              --title "V1 Native Build ${{ github.run_number }}.${{ github.run_attempt }}" \
              --notes "Automated native build for $GITHUB_SHA." \
              --prerelease \
              --latest=false
          fi
